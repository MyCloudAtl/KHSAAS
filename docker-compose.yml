version: '3.8'
services:
  proto-okn:
    image: akkariin/proto-okn-sparql-visualization:0.1.3
    container_name: proto-okn
    ports:
      - "3030:3030"
      - "80:80"
    volumes:
      - ./data:/data  
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300  